services:
  postgres:
    image: postgres:15
    container_name: postgres-ecommerce-dev
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ecommerce_secret_password_123
      POSTGRES_DB: ecommerceproject
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  ecommerce-api:
    container_name: api-ecommerce-dev
    build:
      context: ../../
      dockerfile: infra/dev/Dockerfile
    ports:
      - "8080:8080"
    depends_on:
      - postgres
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/ecommerceproject
      DB_USER: postgres
      DB_PASSWORD: ecommerce_secret_password_123

  pgadmin:
    image: dpage/pgadmin4
    container_name: pgadmin-ecommerce-dev
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_SERVER_JSON_FILE: /pgadmin4/servers.json
    ports:
      - "5050:80"
    volumes:
      - ./servers.json:/pgadmin4/servers.json
    depends_on:
      - postgres

volumes:
  postgres_data:
